  <text x="307" y="436" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Azure GPT-4 Turbo</text>
  <text x="307" y="449" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Transcript → HTML BRD</text>
  <text x="307" y="462" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Structured prompt template</text>
  <text x="307" y="478" text-anchor="middle" fill="#a29bfe" font-size="8" opacity="0.9">l2_direct_html_brd.py</text>
  <text x="307" y="490" text-anchor="middle" fill="#74b9ff" font-size="8" opacity="0.8">temp=0.7, max_tokens=4000</text>

  <!-- Arrow L2 → L3 -->
  <line x1="385" y1="447" x2="408" y2="447" stroke="#a29bfe" stroke-width="1.3" marker-end="url(#arrow-purple)"/>

  <!-- L3 -->
  <rect x="410" y="400" width="155" height="95" rx="8" fill="#6c5ce7" fill-opacity="0.15" stroke="#a29bfe" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="487" y="420" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="700">L3 · GAP ANALYSIS</text>
  <text x="487" y="436" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Azure GPT-4 Turbo</text>
  <text x="487" y="449" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">BRD → Questions</text>
  <text x="487" y="462" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Identifies missing info</text>
  <text x="487" y="478" text-anchor="middle" fill="#a29bfe" font-size="8" opacity="0.9">l3_brd_qa.py</text>
  <text x="487" y="490" text-anchor="middle" fill="#74b9ff" font-size="8" opacity="0.8">Stored as brd_questions.json</text>

  <!-- Arrow L3 → L4 -->
  <line x1="565" y1="447" x2="588" y2="447" stroke="#a29bfe" stroke-width="1.3" marker-end="url(#arrow-purple)"/>

  <!-- L4 -->
