  <text x="500" y="390" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="600" letter-spacing="1.5">AI PROCESSING PIPELINE - Azure OpenAI + AWS Bedrock</text>

  <!-- L1 -->
  <rect x="50" y="400" width="155" height="95" rx="8" fill="#6c5ce7" fill-opacity="0.15" stroke="#a29bfe" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="127" y="420" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="700">L1 · TRANSCRIPTION</text>
  <text x="127" y="436" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Azure Whisper API</text>
  <text x="127" y="449" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Parallel chunk processing</text>
  <text x="127" y="462" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Video → Audio → Text</text>
  <text x="127" y="478" text-anchor="middle" fill="#a29bfe" font-size="8" opacity="0.9">l1_transcript_generation.py</text>
  <text x="127" y="490" text-anchor="middle" fill="#74b9ff" font-size="8" opacity="0.8">ThreadPoolExecutor</text>

  <!-- Arrow L1 → L2 -->
  <line x1="205" y1="447" x2="228" y2="447" stroke="#a29bfe" stroke-width="1.3" marker-end="url(#arrow-purple)"/>

