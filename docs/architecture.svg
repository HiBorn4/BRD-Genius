  <text x="135" y="598" text-anchor="middle" fill="#fd79a8" font-size="10" font-weight="700">Google Cloud Storage</text>
  <text x="135" y="613" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">GCS Bucket: brd001</text>
  <text x="135" y="626" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">User session files</text>
  <text x="135" y="640" text-anchor="middle" fill="#fd79a8" font-size="8" opacity="0.8">FileStorageManager (GCS/Local)</text>

  <!-- Firestore -->
  <rect x="235" y="578" width="155" height="72" rx="8" fill="#fd79a8" fill-opacity="0.1" stroke="#fd79a8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="312" y="598" text-anchor="middle" fill="#fd79a8" font-size="10" font-weight="700">Firebase Firestore</text>
  <text x="312" y="613" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">Session metadata</text>
  <text x="312" y="626" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">User token store</text>
  <text x="312" y="640" text-anchor="middle" fill="#fd79a8" font-size="8" opacity="0.8">firestore_helper.py</text>

  <!-- Secret Manager -->
  <rect x="410" y="578" width="155" height="72" rx="8" fill="#fd79a8" fill-opacity="0.1" stroke="#fd79a8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="487" y="598" text-anchor="middle" fill="#fd79a8" font-size="10" font-weight="700">Secret Manager</text>
  <text x="487" y="613" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">GCP Secret Manager</text>
  <text x="487" y="626" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">Env vars at runtime</text>
  <text x="487" y="640" text-anchor="middle" fill="#fd79a8" font-size="8" opacity="0.8">No secrets in code</text>

  <!-- Azure AD -->
  <rect x="585" y="578" width="155" height="72" rx="8" fill="#fd79a8" fill-opacity="0.1" stroke="#fd79a8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="662" y="598" text-anchor="middle" fill="#fd79a8" font-size="10" font-weight="700">Azure AD / OAuth2</text>
  <text x="662" y="613" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">SSO authentication</text>
  <text x="662" y="626" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">JWT token flow</text>
  <text x="662" y="640" text-anchor="middle" fill="#fd79a8" font-size="8" opacity="0.8">refresh_token_generator.py</text>

  <!-- MS Graph -->
  <rect x="760" y="578" width="175" height="72" rx="8" fill="#fd79a8" fill-opacity="0.1" stroke="#fd79a8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="847" y="598" text-anchor="middle" fill="#fd79a8" font-size="10" font-weight="700">Microsoft Graph API</text>
  <text x="847" y="613" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">OneDrive video access</text>
  <text x="847" y="626" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.7">Files.Read.All scope</text>
  <text x="847" y="640" text-anchor="middle" fill="#fd79a8" font-size="8" opacity="0.8">link_to_video.py</text>

  <!-- Output label -->
  <rect x="30" y="675" width="940" height="35" rx="8" fill="#1e2d40" stroke="#4a90e2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="688" text-anchor="middle" fill="#4a90e2" font-size="9" font-weight="600" opacity="0.9">OUTPUT: Structured HTML Business Requirements Document  →  Exportable as .docx Word File</text>
  <text x="500" y="703" text-anchor="middle" fill="#74b9ff" font-size="8.5" opacity="0.7">Deploy: Docker + Google Cloud Run  |  Local: Python 3.11 + pipenv  |  Storage: GCS or Local filesystem</text>
</svg>
