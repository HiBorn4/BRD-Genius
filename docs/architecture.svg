  <text x="667" y="420" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="700">L4 · CHATBOT</text>
  <text x="667" y="436" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">AWS Bedrock Claude 3.5</text>
  <text x="667" y="449" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">LangChain memory (k=20)</text>
  <text x="667" y="462" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Asks targeted questions</text>
  <text x="667" y="478" text-anchor="middle" fill="#a29bfe" font-size="8" opacity="0.9">core_chatbot.py</text>
  <text x="667" y="490" text-anchor="middle" fill="#74b9ff" font-size="8" opacity="0.8">ConversationBufferWindow</text>

  <!-- Arrow L4 → L5 -->
  <line x1="745" y1="447" x2="768" y2="447" stroke="#a29bfe" stroke-width="1.3" marker-end="url(#arrow-purple)"/>

  <!-- L5 -->
  <rect x="770" y="400" width="165" height="95" rx="8" fill="#6c5ce7" fill-opacity="0.15" stroke="#a29bfe" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="852" y="420" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="700">L5 · FINAL BRD</text>
  <text x="852" y="436" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">Azure GPT-4 Turbo</text>
  <text x="852" y="449" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">BRD + Chat + Docs</text>
  <text x="852" y="462" text-anchor="middle" fill="#ffffff" font-size="8.5" opacity="0.75">→ Polished HTML output</text>
  <text x="852" y="478" text-anchor="middle" fill="#a29bfe" font-size="8" opacity="0.9">l5_brd_gen.py</text>
  <text x="852" y="490" text-anchor="middle" fill="#74b9ff" font-size="8" opacity="0.8">temp=0.5 (precise output)</text>

  <!-- Arrow to Storage -->
  <line x1="500" y1="510" x2="500" y2="548" stroke="#a29bfe" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-purple)"/>

  <!-- ═══ STORAGE & AUTH ═══ -->
  <rect x="30" y="550" width="940" height="115" rx="10" fill="url(#storageGrad)" stroke="#fd79a8" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="500" y="570" text-anchor="middle" fill="#fd79a8" font-size="11" font-weight="600" letter-spacing="1.5">STORAGE, AUTH &amp; EXTERNAL SERVICES</text>

