  <text x="500" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">BRD GENIUS - SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="52" x2="800" y2="52" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>

  <!-- ═══ INPUT SOURCES (top) ═══ -->
