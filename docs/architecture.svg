  <text x="500" y="95" text-anchor="middle" fill="#fdcb6e" font-size="11" font-weight="600" letter-spacing="1.5" opacity="0.9">INPUT SOURCES</text>

  <!-- Input boxes -->
  <rect x="55" y="105" width="130" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="120" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">🎥</text>
  <text x="120" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">MP4 / MP3</text>
  <text x="120" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">Meeting Recording</text>

  <rect x="215" y="105" width="130" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="280" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">📄</text>
  <text x="280" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">PDF / DOCX / TXT</text>
  <text x="280" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">Supporting Docs</text>

  <rect x="375" y="105" width="130" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="440" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">☁️</text>
  <text x="440" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">OneDrive Link</text>
  <text x="440" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">MS Graph API</text>

  <rect x="535" y="105" width="130" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="600" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">🔗</text>
  <text x="600" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">SSO Login</text>
  <text x="600" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">JWT / OAuth2</text>

  <rect x="695" y="105" width="130" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="760" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">💬</text>
  <text x="760" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">Chatbot Q&amp;A</text>
  <text x="760" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">Interactive Refinement</text>

  <rect x="845" y="105" width="110" height="60" rx="8" fill="#fdcb6e" fill-opacity="0.12" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="900" y="130" text-anchor="middle" fill="#fdcb6e" font-size="13">🌐</text>
  <text x="900" y="148" text-anchor="middle" fill="#fdcb6e" font-size="10" font-weight="600">REST API</text>
  <text x="900" y="161" text-anchor="middle" fill="#fdcb6e" font-size="9" opacity="0.7">Flask Endpoints</text>

  <!-- Arrows from inputs to Flask -->
  <line x1="120" y1="165" x2="120" y2="213" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="280" y1="165" x2="280" y2="213" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="440" y1="165" x2="440" y2="213" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="500" y1="165" x2="500" y2="213" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="760" y1="165" x2="760" y2="213" stroke="#fdcb6e" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- ═══ FLASK API LAYER ═══ -->
  <rect x="30" y="215" width="940" height="110" rx="10" fill="url(#flaskGrad)" stroke="#00d4aa" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="500" y="235" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="600" letter-spacing="1.5">FLASK REST API - main.py  |  Port 8501</text>

  <!-- API endpoints -->
  <rect x="55" y="244" width="135" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="122" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/upload</text>
  <text x="122" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">POST · Upload files</text>
  <text x="122" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">PDF/DOCX/MP4/MP3</text>
  <text x="122" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ Triggers L1+L2+L3</text>

  <rect x="205" y="244" width="135" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="272" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/chatbot</text>
  <text x="272" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">POST · Conversational</text>
  <text x="272" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">Q&amp;A refinement</text>
  <text x="272" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ Bedrock Claude</text>

  <rect x="355" y="244" width="135" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="422" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/final</text>
  <text x="422" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">POST · Generate final</text>
  <text x="422" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">BRD with chat context</text>
  <text x="422" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ Triggers L5</text>

  <rect x="505" y="244" width="135" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="572" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/downloadbrd</text>
  <text x="572" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">POST · Export HTML</text>
  <text x="572" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">BRD → .docx file</text>
  <text x="572" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ html_to_docx</text>

  <rect x="655" y="244" width="135" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="722" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/uploadvialink</text>
  <text x="722" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">POST · OneDrive</text>
  <text x="722" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">video download</text>
  <text x="722" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ MS Graph API</text>

  <rect x="805" y="244" width="140" height="66" rx="7" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="875" y="264" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="700">/listfiles · /delete</text>
  <text x="875" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">Session management</text>
  <text x="875" y="291" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.7">Auth callbacks (SSO)</text>
  <text x="875" y="304" text-anchor="middle" fill="#00d4aa" font-size="8" opacity="0.8">→ Firestore</text>

